  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

      background: linear-gradient(135deg, #FAF8F2 0%, #F5F1E8 50%, #EDE9DE 100%);
      min-height: 100vh;
    }
    #root { min-height: 100vh; }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      background: #FAF8F2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
    }

      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, #1B4F72, #2E86C1);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900; color: #fff;
      box-shadow: 0 8px 24px rgba(27,79,114,0.35);
      animation: pulse 1.4s ease-in-out infinite;
    }
    #loading .title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 700; color: #1B4F72;
    }
    #loading .sub {
      font-size: 11px; letter-spacing: 2px; color: #7F8C8D;
      text-transform: uppercase;
    }
    #loading .bar-wrap {
      width: 200px; height: 3px; background: #EDE9E0;
      border-radius: 2px; overflow: hidden;
    }
    #loading .bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #1B4F72, #17A589);
      border-radius: 2px;
      animation: load 1.8s ease forwards;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 24px rgba(27,79,114,0.35); }
      50%       { transform: scale(1.06); box-shadow: 0 12px 32px rgba(27,79,114,0.5); }
    }
    @keyframes load {
      0%   { width: 0%; }
      60%  { width: 75%; }
      100% { width: 100%; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D4C9A8; border-radius: 3px; }

    /* Button reset */
    button { font-family: inherit; }
    button:focus-visible { outline: 2px solid #2E86C1; outline-offset: 2px; }
    input, select { font-family: inherit; }
    select { cursor: pointer; }
    table { border-collapse: collapse; }
  </style>
</head>

  const pctColor = p => p >= 80 ? "#27AE60" : p >= 60 ? "#F39C12" : "#E74C3C";
  const pctBg    = p => p >= 80 ? "#D5F5E3" : p >= 60 ? "#FEF9E7" : "#FADBD8";

  function AnimatedNumber({ value, duration = 1100 }) {
    const [display, setDisplay] = useState(0);
    useEffect(() => {
      const target = typeof value === "number" ? value : parseFloat(value) || 0;
      let start = 0;
      const step = target / (duration / 16);
      const id = setInterval(() => {
        start = Math.min(start + step, target);
        setDisplay(start);
        if (start >= target) clearInterval(id);
      }, 16);
      return () => clearInterval(id);
    }, [value]);
    const isFloat = typeof value === "number" && !Number.isInteger(value);
    return <>{isFloat ? display.toFixed(1) : Math.round(display).toLocaleString()}</>;
  }

  function RadialProgress({ pct, size=84, stroke=8, color="#2E86C1", label }) {
    const [animated, setAnimated] = useState(0);
    const R = (size - stroke * 2) / 2;
    const circ = 2 * Math.PI * R;
    useEffect(() => { const t = setTimeout(() => setAnimated(pct), 120); return ()=>clearTimeout(t); }, [pct]);
    return (
      <div style={{textAlign:"center", minWidth:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          <circle cx={size/2} cy={size/2} r={R} fill="none" stroke="#E8E4DC" strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={R} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={circ} strokeDashoffset={circ*(1-animated/100)} strokeLinecap="round"
            style={{transition:"stroke-dashoffset 1.3s cubic-bezier(.4,0,.2,1)"}}/>
        </svg>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:"#2C3E50",marginTop:4}}>{pct}%</div>
        <div style={{fontSize:9,color:"#7F8C8D",letterSpacing:1,textTransform:"uppercase",marginTop:1}}>{label}</div>
      </div>
    );
  }

    return (

          {pct}%
        </span>
      </div>
    );
  }

    const m = DEPT_META[dept] || {light:"#EEE",color:"#555",accent:"#888",emoji:"📋"};

      <span style={{background:m.light,color:m.color,border:`1px solid ${m.accent}44`,

        {m.emoji} {dept}
      </span>
    );

  function Card({ children, style={} }) {
    return (
      <div style={{background:"#FFFEF7",border:"1px solid #E8E4DC",borderRadius:12,
        boxShadow:"0 2px 12px rgba(0,0,0,0.06)",...style}}>
        {children}
      </div>
    );
  }

    return (
      <Card style={{padding:"20px 22px",borderLeft:`4px solid ${accent}`,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-10,right:-10,fontSize:52,opacity:0.06,pointerEvents:"none"}}>{icon}</div>
        <div style={{fontSize:10,fontWeight:700,color:"#7F8C8D",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>{label}</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:900,color:"#2C3E50",lineHeight:1}}>
          <AnimatedNumber value={value}/>
          {isFloat ? "%" : ""}
        </div>
        {sub && <div style={{fontSize:11,color:"#95A5A6",marginTop:6}}>{sub}</div>}
      </Card>
    );
  }

  function SectionHeader({ title, subtitle, children }) {
    return (
      <div style={{marginBottom:20,paddingBottom:10,borderBottom:"2px solid #EDE9E0",
        display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:"#2C3E50",fontWeight:700,margin:0}}>{title}</h2>
          {subtitle && <p style={{fontSize:12,color:"#7F8C8D",margin:"3px 0 0"}}>{subtitle}</p>}
        </div>
        {children}
      </div>
    );
  }

  function CustomTooltip({ active, payload, label }) {
    if (!active || !payload?.length) return null;
    return (
      <div style={{background:"#FFFEF7",border:"1px solid #D4C9A8",borderRadius:8,padding:"10px 14px",
        boxShadow:"0 4px 20px rgba(0,0,0,0.12)",fontSize:12}}>
        <p style={{fontWeight:700,color:"#2C3E50",marginBottom:6,fontSize:13}}>{label}</p>
        {payload.map((p,i) => (
          <div key={i} style={{display:"flex",justifyContent:"space-between",gap:16,color:"#666",marginBottom:3}}>
            <span style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:p.color,display:"inline-block"}}/>
              {p.name}
            </span>
            <span style={{fontWeight:600,color:"#2C3E50",fontFamily:"'Courier Prime',monospace"}}>{p.value}</span>
          </div>
        ))}
      </div>
    );
  }

    padding:"8px 12px",fontSize:13,color:"#2C3E50",outline:"none" };

  // ─────────────────────────────────────────────────────────────────────────────
  // SUBJECTS TAB
  // ─────────────────────────────────────────────────────────────────────────────
  function SubjectsTab() {
    const [search, setSearch] = useState("");
    const [deptFilter, setDeptFilter] = useState("all");
    const [sort, setSort] = useState("pass_pct_desc");
    const [hov, setHov] = useState(null);
    const depts = useMemo(()=>[...new Set(SUBJECTS.map(s=>s.dept))],[]);
    const filtered = useMemo(()=>{
      let d = SUBJECTS.filter(s=>
        s.subject.toLowerCase().includes(search.toLowerCase()) &&
        (deptFilter==="all" || s.dept===deptFilter)
      );
      if(sort==="pass_pct_desc") d.sort((a,b)=>b.pass_pct-a.pass_pct);
      else if(sort==="pass_pct_asc") d.sort((a,b)=>a.pass_pct-b.pass_pct);
      else if(sort==="total_desc") d.sort((a,b)=>b.total-a.total);
      else d.sort((a,b)=>a.subject.localeCompare(b.subject));
      return d;
    },[search,deptFilter,sort]);

    return (
      <div>
        <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
          <input placeholder="🔍  Search subjects…" value={search} onChange={e=>setSearch(e.target.value)} style={{...sel,minWidth:200}}/>
          <select value={deptFilter} onChange={e=>setDeptFilter(e.target.value)} style={sel}>
            <option value="all">All Departments</option>
            {depts.map(d=><option key={d} value={d}>{d}</option>)}
          </select>
          <select value={sort} onChange={e=>setSort(e.target.value)} style={sel}>
            <option value="pass_pct_desc">Pass% ↓</option>
            <option value="pass_pct_asc">Pass% ↑</option>
            <option value="total_desc">Total ↓</option>
            <option value="alpha">A–Z</option>
          </select>
          <span style={{fontSize:12,color:"#7F8C8D",fontFamily:"'Courier Prime',monospace"}}>
            {filtered.length}/{SUBJECTS.length} subjects
          </span>
        </div>
        <Card>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{background:"#F7F4EE"}}>
                  {["Subject","Department","Total","Male","Female","Passed","Failed","Pass Rate"].map(h=>(
                    <th key={h} style={{padding:"12px 14px",textAlign:"left",fontSize:10,fontWeight:700,
                      letterSpacing:1.5,textTransform:"uppercase",color:"#7F8C8D",
                      borderBottom:"2px solid #EDE9E0",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((s,i)=>(
                  <tr key={s.subject} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}
                    style={{background:hov===i?"#F7F4EE":i%2===0?"#FFFEF7":"#FAFAF5",transition:"background 0.12s",
                      borderBottom:"1px solid #F0ECE4"}}>
                    <td style={{padding:"11px 14px",fontWeight:600,fontSize:13,color:"#2C3E50"}}>{s.subject}</td>
                    <td style={{padding:"11px 14px"}}><DeptBadge dept={s.dept}/></td>
                    <td style={{padding:"11px 14px",fontFamily:"'Courier Prime',monospace",fontSize:13}}>{s.total}</td>
                    <td style={{padding:"11px 14px",fontFamily:"'Courier Prime',monospace",fontSize:13,color:"#2E86C1"}}>{s.total_m}</td>
                    <td style={{padding:"11px 14px",fontFamily:"'Courier Prime',monospace",fontSize:13,color:"#E67E22"}}>{s.total_f}</td>
                    <td style={{padding:"11px 14px",fontFamily:"'Courier Prime',monospace",fontSize:13,color:"#27AE60"}}>{s.pass_total}</td>
                    <td style={{padding:"11px 14px",fontFamily:"'Courier Prime',monospace",fontSize:13,color:s.fail_total>0?"#E74C3C":"#27AE60"}}>{s.fail_total}</td>
                    <td style={{padding:"11px 14px",minWidth:160}}><PassBar pct={s.pass_pct}/></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // GRADES TAB
  // ─────────────────────────────────────────────────────────────────────────────
  function GradesTab() {
    const [view, setView] = useState("combined");
    const [hov, setHov] = useState(null);
    const maxVal = useMemo(()=>{
      let m=0;
      SUBJECTS.forEach(s=>GRADES.forEach(g=>{
        const v=view==="male"?s[`${g}_m`]:view==="female"?s[`${g}_f`]:(s[`${g}_m`]+s[`${g}_f`]);
        if(v>m)m=v;
      }));
      return m;
    },[view]);
    const bandTotals = useMemo(()=>GRADES.map(g=>({grade:g,total:SUBJECTS.reduce((a,s)=>a+(s[`${g}_m`]+s[`${g}_f`]),0)})),[]);
    const btnSt = active=>({padding:"6px 14px",border:"1px solid #D4C9A8",borderRadius:6,
      background:active?"#2C3E50":"#FFFEF7",color:active?"#fff":"#555",fontSize:12,cursor:"pointer",transition:"all 0.2s"});

    return (
      <div>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {["combined","male","female"].map(v=>(
            <button key={v} style={btnSt(view===v)} onClick={()=>setView(v)}>
              {v==="combined"?"Combined":v==="male"?"♂ Male":"♀ Female"}
            </button>
          ))}
        </div>

        <div style={{marginBottom:24}}>
          <SectionHeader title="Grade Distribution Heatmap" subtitle="Cell intensity = students in that band. Hover for M/F detail."/>
          <Card style={{padding:20}}>
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"separate",borderSpacing:2}}>
                <thead>
                  <tr>
                    <th style={{textAlign:"left",padding:"6px 8px",fontSize:11,color:"#7F8C8D",minWidth:165}}>Subject</th>
                    {GRADES.map(g=>(
                      <th key={g} style={{padding:"6px 8px",textAlign:"center",fontSize:11,color:GRADE_COLORS[g],
                        fontFamily:"'Courier Prime',monospace",fontWeight:700,minWidth:44}}>{g}</th>
                    ))}
                    <th style={{padding:"6px 8px",textAlign:"center",fontSize:10,color:"#7F8C8D"}}>Pass%</th>
                  </tr>
                </thead>
                <tbody>
                  {SUBJECTS.map((s,si)=>(
                    <tr key={s.subject}>
                      <td style={{padding:"5px 8px",fontSize:11,color:"#2C3E50",fontWeight:500}}>
                        {s.subject.length>22?s.subject.slice(0,22)+"…":s.subject}
                      </td>
                      {GRADES.map((g,gi)=>{
                        const val=view==="male"?s[`${g}_m`]:view==="female"?s[`${g}_f`]:(s[`${g}_m`]+s[`${g}_f`]);
                        const int=maxVal>0?val/maxVal:0;
                        const hue=GRADE_HUES[gi];
                        const bg=int>0.05?`hsla(${hue},${60+int*30}%,${50-int*20}%,${0.2+int*0.75})`:"#F5F2EC";
                        const isH=hov?.[0]===si&&hov?.[1]===gi;
                        return (
                          <td key={g} title={`${s.subject} · ${g}: M=${s[`${g}_m`]} F=${s[`${g}_f`]}`}
                            onMouseEnter={()=>setHov([si,gi])} onMouseLeave={()=>setHov(null)}
                            style={{background:bg,color:int>0.5?"#fff":"#555",textAlign:"center",
                              fontSize:11,fontFamily:"'Courier Prime',monospace",borderRadius:5,padding:"5px 3px",
                              transform:isH?"scale(1.2)":"scale(1)",transition:"transform 0.15s",
                              position:"relative",zIndex:isH?10:1,cursor:"default"}}>
                            {val||0}
                          </td>
                        );
                      })}
                      <td style={{padding:"5px 8px",textAlign:"center"}}>
                        <span style={{fontFamily:"'Courier Prime',monospace",fontSize:11,fontWeight:700,
                          color:pctColor(view==="male"?s.pass_pct_m:view==="female"?s.pass_pct_f:s.pass_pct)}}>
                          {view==="male"?s.pass_pct_m:view==="female"?s.pass_pct_f:s.pass_pct}%
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
          <Card style={{padding:20}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:"#2C3E50",marginBottom:14}}>Aggregate Grade Bands</div>
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={bandTotals}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F0ECE4"/>
                <XAxis dataKey="grade" tick={{fontSize:11,fill:"#555",fontFamily:"Courier Prime,monospace"}}/>
                <YAxis tick={{fontSize:10,fill:"#95A5A6"}}/>
                <Tooltip content={<CustomTooltip/>}/>
                <Bar dataKey="total" name="Students" radius={[4,4,0,0]}>
                  {bandTotals.map((b,i)=><Cell key={i} fill={GRADE_COLORS[b.grade]}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </Card>
          <Card style={{padding:20}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:"#2C3E50",marginBottom:14}}>Grade Band Legend</div>
            {[
              {range:"A1–B3",label:"Excellent",color:"#27AE60",bg:"#D5F5E3",desc:"Top performance"},
              {range:"C4–C6",label:"Credit",   color:"#F39C12",bg:"#FEF9E7",desc:"Satisfactory pass"},
              {range:"D7–E8",label:"Pass",     color:"#E67E22",bg:"#FDEBD0",desc:"Below average"},
              {range:"F9",   label:"Fail",     color:"#E74C3C",bg:"#FADBD8",desc:"Not passed"},
            ].map(b=>(
              <div key={b.range} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",
                background:b.bg,borderRadius:8,marginBottom:8,border:`1px solid ${b.color}33`}}>
                <span style={{fontFamily:"'Courier Prime',monospace",fontWeight:700,fontSize:14,color:b.color,width:46}}>{b.range}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:"#2C3E50"}}>{b.label}</div>
                  <div style={{fontSize:11,color:"#7F8C8D"}}>{b.desc}</div>
                </div>
              </div>
            ))}
          </Card>
        </div>
      </div>
    );
  }

            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:"#F7F4EE"}}>
                    <th style={{padding:"12px 16px",textAlign:"left",fontSize:10,fontWeight:700,
                      letterSpacing:1.5,textTransform:"uppercase",color:"#7F8C8D",
                      borderBottom:"2px solid #EDE9E0",width:"30%"}}>Subject</th>
                    {["Total M","Pass M","Pass% M","Total F","Pass F","Pass% F","Gap"].map(h=>(
                      <th key={h} style={{padding:"12px 12px",textAlign:"center",fontSize:10,fontWeight:700,
                        letterSpacing:1.2,textTransform:"uppercase",borderBottom:"2px solid #EDE9E0",
                        color:h.includes("M")&&!h.includes("Gap")?"#2E86C1":h.includes("F")?"#E67E22":"#7F8C8D"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {SUBJECTS.map((s,i)=>{
                    const gap=s.total_m>0&&s.total_f>0?+(s.pass_pct_m-s.pass_pct_f).toFixed(1):null;
                    return (
                      <tr key={s.subject} style={{background:i%2===0?"#FFFEF7":"#FAFAF5",borderBottom:"1px solid #F0ECE4"}}>
                        <td style={{padding:"10px 16px",fontSize:12,fontWeight:600,color:"#2C3E50"}}>{s.subject}</td>
                        <td style={{padding:"10px 12px",textAlign:"center",fontFamily:"'Courier Prime',monospace",fontSize:12,color:"#2E86C1"}}>{s.total_m}</td>
                        <td style={{padding:"10px 12px",textAlign:"center",fontFamily:"'Courier Prime',monospace",fontSize:12,color:"#2E86C1"}}>{s.pass_m}</td>
                        <td style={{padding:"10px 12px",textAlign:"center"}}>
                          <span style={{fontFamily:"'Courier Prime',monospace",fontSize:11,fontWeight:700,
                            color:"#2E86C1",background:"#D6EAF8",padding:"2px 8px",borderRadius:4}}>{s.pass_pct_m}%</span>
                        </td>
                        <td style={{padding:"10px 12px",textAlign:"center",fontFamily:"'Courier Prime',monospace",fontSize:12,color:"#E67E22"}}>{s.total_f}</td>
                        <td style={{padding:"10px 12px",textAlign:"center",fontFamily:"'Courier Prime',monospace",fontSize:12,color:"#E67E22"}}>{s.pass_f}</td>
                        <td style={{padding:"10px 12px",textAlign:"center"}}>
                          <span style={{fontFamily:"'Courier Prime',monospace",fontSize:11,fontWeight:700,
                            color:"#E67E22",background:"#FDEBD0",padding:"2px 8px",borderRadius:4}}>{s.pass_pct_f}%</span>
                        </td>
                        <td style={{padding:"10px 12px",textAlign:"center"}}>
                          {gap!==null
                            ? <span style={{fontFamily:"'Courier Prime',monospace",fontSize:11,fontWeight:700,
                                color:Math.abs(gap)<5?"#27AE60":gap>0?"#2E86C1":"#E67E22",
                                background:Math.abs(gap)<5?"#D5F5E3":gap>0?"#D6EAF8":"#FDEBD0",
                                padding:"2px 8px",borderRadius:4}}>{gap>0?"+":""}{gap}pp</span>
                            : <span style={{color:"#CCC"}}>—</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // DEPARTMENTS TAB
  // ─────────────────────────────────────────────────────────────────────────────
  function DepartmentsTab() {
    const [selected, setSelected] = useState(null);
    const deptStats = useMemo(()=>[...new Set(SUBJECTS.map(s=>s.dept))].map(d=>{
      const subs=SUBJECTS.filter(s=>s.dept===d);
      const tot=subs.reduce((a,s)=>a+s.total,0), pass=subs.reduce((a,s)=>a+s.pass_total,0);
      const pct=tot>0?+(pass/tot*100).toFixed(1):0;
      return {dept:d, subjects:subs, total:tot, pass_pct:pct,
        meta:DEPT_META[d]||{color:"#555",light:"#EEE",accent:"#888",emoji:"📋"},
        gradeBreakdown:GRADES.map(g=>({grade:g,total:subs.reduce((a,s)=>a+(s[`${g}_m`]+s[`${g}_f`]),0)}))};
    }),[]);
    const selDept = selected ? deptStats.find(d=>d.dept===selected) : null;

    return (
      <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(195px,1fr))",gap:16,marginBottom:28}}>
          {deptStats.map(d=>(
            <Card key={d.dept} onClick={()=>setSelected(selected===d.dept?null:d.dept)}
              style={{padding:20,cursor:"pointer",borderLeft:`4px solid ${d.meta.accent}`,transition:"all 0.2s",
                boxShadow:selected===d.dept?`0 6px 24px ${d.meta.accent}40`:"0 2px 12px rgba(0,0,0,0.06)",
                background:selected===d.dept?d.meta.light:"#FFFEF7"}}>
              <div style={{fontSize:24,marginBottom:8}}>{d.meta.emoji}</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:"#2C3E50",marginBottom:12}}>{d.dept}</div>
              {[["Subjects",d.subjects.length],["Total",d.total],["Pass Rate",`${d.pass_pct}%`]].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:11,color:"#7F8C8D"}}>{l}</span>
                  <span style={{fontFamily:"'Courier Prime',monospace",fontSize:12,fontWeight:700,
                    color:l==="Pass Rate"?pctColor(d.pass_pct):"#2C3E50"}}>{v}</span>
                </div>
              ))}
              <div style={{height:4,background:"#EDE9E0",borderRadius:2,marginTop:10}}>
                <div style={{width:`${d.pass_pct}%`,height:"100%",background:d.meta.accent,borderRadius:2}}/>
              </div>
            </Card>
          ))}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:28}}>
          <Card style={{padding:20}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:"#2C3E50",marginBottom:14}}>Department Pass Rates</div>
            <ResponsiveContainer width="100%" height={240}>
              <BarChart data={deptStats.map(d=>({name:d.dept.replace(" Economics","Econ"),pct:d.pass_pct}))}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F0ECE4"/>
                <XAxis dataKey="name" tick={{fontSize:10,fill:"#555"}} angle={-15} textAnchor="end" height={45}/>
                <YAxis tick={{fontSize:10,fill:"#95A5A6"}} domain={[0,105]}/>
                <Tooltip content={<CustomTooltip/>}/>
                <Bar dataKey="pct" name="Pass %" radius={[5,5,0,0]}>
                  {deptStats.map((d,i)=><Cell key={i} fill={d.meta.accent}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </Card>
          <Card style={{padding:20}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:"#2C3E50",marginBottom:14}}>Grade Stack by Department</div>
            <ResponsiveContainer width="100%" height={240}>
              <BarChart data={deptStats.map(d=>({name:d.dept.split(" ")[0],...Object.fromEntries(d.gradeBreakdown.map(g=>[g.grade,g.total]))}))}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F0ECE4"/>
                <XAxis dataKey="name" tick={{fontSize:10,fill:"#555"}}/>
                <YAxis tick={{fontSize:10,fill:"#95A5A6"}}/>
                <Tooltip content={<CustomTooltip/>}/>
                {GRADES.map(g=><Bar key={g} dataKey={g} stackId="a" fill={GRADE_COLORS[g]}/>)}
              </BarChart>
            </ResponsiveContainer>
          </Card>
        </div>

        {selDept && (
          <div>
            <SectionHeader
              title={`${selDept.meta.emoji} ${selDept.dept} — Subject Details`}
              subtitle={`${selDept.subjects.length} subjects · ${selDept.total} candidates · ${selDept.pass_pct}% pass rate`}/>
            <Card>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr style={{background:selDept.meta.light}}>
                      {["Subject","Total","Male","Female","Passed","Failed","Pass Rate"].map(h=>(
                        <th key={h} style={{padding:"11px 14px",textAlign:"left",fontSize:10,fontWeight:700,
                          letterSpacing:1.5,textTransform:"uppercase",color:selDept.meta.color,
                          borderBottom:`2px solid ${selDept.meta.accent}44`}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {selDept.subjects.map((s,i)=>(
                      <tr key={s.subject} style={{background:i%2===0?"#FFFEF7":"#FAFAF5",borderBottom:"1px solid #F0ECE4"}}>
                        <td style={{padding:"10px 14px",fontWeight:600,fontSize:12,color:"#2C3E50"}}>{s.subject}</td>
                        <td style={{padding:"10px 14px",fontFamily:"'Courier Prime',monospace",fontSize:12}}>{s.total}</td>
                        <td style={{padding:"10px 14px",fontFamily:"'Courier Prime',monospace",fontSize:12,color:"#2E86C1"}}>{s.total_m}</td>
                        <td style={{padding:"10px 14px",fontFamily:"'Courier Prime',monospace",fontSize:12,color:"#E67E22"}}>{s.total_f}</td>
                        <td style={{padding:"10px 14px",fontFamily:"'Courier Prime',monospace",fontSize:12,color:"#27AE60"}}>{s.pass_total}</td>
                        <td style={{padding:"10px 14px",fontFamily:"'Courier Prime',monospace",fontSize:12,color:s.fail_total>0?"#E74C3C":"#27AE60"}}>{s.fail_total}</td>
                        <td style={{padding:"10px 14px",minWidth:150}}><PassBar pct={s.pass_pct}/></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          </div>
        )}
      </div>
    );
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // ROOT APP
  // ─────────────────────────────────────────────────────────────────────────────
  const TABS = [
    {id:"overview",    label:"Overview",    icon:"◈"},
    {id:"subjects",    label:"Subjects",    icon:"◉"},
    {id:"grades",      label:"Grade Dist.", icon:"◎"},
    {id:"gender",      label:"Gender",      icon:"◐"},
    {id:"departments", label:"Departments", icon:"◑"},
  ];

  function App() {
    const [tab, setTab] = useState("overview");

    useEffect(()=>{
      // Hide loader once React mounts
      const el = document.getElementById("loading");
      if(el){ el.style.opacity="0"; el.style.transition="opacity 0.4s"; setTimeout(()=>el.remove(),400); }
    },[]);

    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#FAF8F2 0%,#F5F1E8 50%,#EDE9DE 100%)"}}>
        {/* Rainbow stripe */}
        <div style={{height:5,background:"linear-gradient(90deg,#1B4F72,#17A589,#D68910,#8E44AD,#E74C3C,#E67E22)"}}/>

        {/* Header */}
        <div style={{background:"#FFFEF7",borderBottom:"1px solid #EDE9E0",boxShadow:"0 2px 16px rgba(0,0,0,0.05)"}}>
          <div style={{maxWidth:1300,margin:"0 auto",padding:"20px 28px",
            display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:16}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{width:50,height:50,borderRadius:12,flexShrink:0,
                background:"linear-gradient(135deg,#1B4F72,#2E86C1)",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:22,fontWeight:900,color:"#fff",boxShadow:"0 4px 16px rgba(27,79,114,0.35)"}}>N</div>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900,
                  color:"#1B4F72",lineHeight:1.1}}>Nyinahin Catholic Senior High School</div>
                <div style={{fontSize:11,color:"#7F8C8D",letterSpacing:2,textTransform:"uppercase",marginTop:3}}>
                  WASSCE Results Analysis Dashboard · 2023
                </div>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:42,fontWeight:900,
                color:"#EDE9E0",lineHeight:1,letterSpacing:4,WebkitTextStroke:"1px #D4C9A8"}}>2023</div>
              <div style={{fontSize:10,color:"#95A5A6",letterSpacing:2}}>WEST AFRICA SENIOR SCHOOL CERT.</div>
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{background:"#FFFEF7",borderBottom:"1px solid #EDE9E0"}}>
          <div style={{maxWidth:1300,margin:"0 auto",padding:"0 28px",display:"flex",overflowX:"auto"}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                padding:"14px 20px",border:"none",cursor:"pointer",whiteSpace:"nowrap",
                borderBottom:`3px solid ${tab===t.id?"#1B4F72":"transparent"}`,
                background:"transparent",color:tab===t.id?"#1B4F72":"#7F8C8D",
                fontSize:13,fontWeight:tab===t.id?700:400,transition:"all 0.2s",
                display:"flex",alignItems:"center",gap:7,letterSpacing:0.3}}>
                <span style={{fontSize:15}}>{t.icon}</span>{t.label}
              </button>
            ))}
          </div>
        </div>

        {/* Content */}
        <div style={{maxWidth:1300,margin:"0 auto",padding:"32px 28px 60px"}}>
          {tab==="overview"    && <OverviewTab/>}
          {tab==="subjects"    && <SubjectsTab/>}
          {tab==="grades"      && <GradesTab/>}
          {tab==="gender"      && <GenderTab/>}
          {tab==="departments" && <DepartmentsTab/>}
        </div>

        {/* Footer */}
        <div style={{background:"#2C3E50",padding:"18px 28px",textAlign:"center",
          fontSize:11,color:"#7F8C8D",letterSpacing:1}}>
          Nyinahin Catholic SHS · WASSCE 2023 · Results Analysis Dashboard · Built for Academic Excellence
        </div>
      </div>
    );
  }

  // Mount
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
